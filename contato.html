<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Contato</title>
</head>
<body>

<header>
    <h1>Contato</h1>
</header>

<main class="container">

    <div class="caixa formulario">

        <h2>Entre em Contato</h2>

        <form>

            <label for="nome">Nome e Sobrenome</label>
            <input type="text" id="nome" class="input-padrao" required>

            <label for="email">E-mail</label>
            <input type="email" id="email" class="input-padrao" required>

            <label for="telefone">Telefone</label>
            <input type="tel" id="telefone" class="input-padrao">

            <label for="mensagem">Mensagem</label>
            <textarea id="mensagem" rows="5" class="input-padrao"></textarea>

            <p class="titulo-opcao">Como prefere nosso contato?</p>

            <label>
                <input type="radio" name="contato" value="email">
                E-mail
            </label>

            <label>
                <input type="radio" name="contato" value="telefone">
                Telefone
            </label>

            <label>
                <input type="radio" name="contato" value="whatsapp">
                WhatsApp
            </label>

            <br><br>

            <label>
                <input type="checkbox">
                Gostaria de receber nossas novidades por e-mail?
            </label>

            <br><br>

            <input type="submit" value="Enviar Formulário" class="botao-enviar">

        </form>

    </div>

</main>

<nav>
    <a href="index.html">Voltar</a>
</nav>

</body>
</html>
